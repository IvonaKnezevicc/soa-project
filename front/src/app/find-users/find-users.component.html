<section class="find-users-page">
  <div class="modal-card">
    <h3>Find users</h3>

    <div class="follow-input-row">
      <div class="search-box">
        <input
          type="text"
          [value]="followInputUsername"
          (input)="onSearchInput($any($event.target).value)"
          placeholder="Enter username"
        />

        <div class="search-dropdown" *ngIf="searchResults.length > 0 || searchLoading">
          <p class="search-state" *ngIf="searchLoading">Searching users...</p>
          <button
            type="button"
            class="search-result"
            *ngFor="let item of searchResults"
            (click)="selectSearchResult(item.username)"
          >
            {{ item.username }}
          </button>
        </div>
      </div>

      <button type="button" [disabled]="followSubmitting || !followInputUsername.trim()" (click)="follow(followInputUsername)">
        {{ followSubmitting ? 'Following...' : 'Follow' }}
      </button>
    </div>
    <p class="error" *ngIf="followErrorMessage">{{ followErrorMessage }}</p>
    <p class="message success" *ngIf="followSuccessMessage">{{ followSuccessMessage }}</p>

    <div class="recommendations">
      <h4>Recommended profiles:</h4>
      <p *ngIf="recommendationUsernames.length === 0">No recommendations yet.</p>
      <div class="recommendation-list" *ngIf="recommendationUsernames.length > 0">
        <button
          type="button"
          class="recommendation-chip"
          *ngFor="let item of recommendationUsernames"
          [disabled]="followSubmitting || isFollowing(item.username)"
          (click)="followRecommendation(item.username)"
        >
          {{ item.username }}<span *ngIf="item.mutualConnections > 0"> ({{ item.mutualConnections }} mutual)</span>
        </button>
      </div>
    </div>

  </div>
</section>

<div class="confirm-backdrop" *ngIf="followConfirmUsername">
  <div class="confirm-dialog" role="dialog" aria-modal="true" aria-labelledby="follow-confirm-title">
    <h4 id="follow-confirm-title">Follow user</h4>
    <p>Do you want to follow {{ followConfirmUsername }}?</p>
    <div class="confirm-actions">
      <button type="button" class="secondary-button" (click)="cancelFollowConfirmation()">Cancel</button>
      <button type="button" (click)="confirmFollowFromDialog()">Follow</button>
    </div>
  </div>
</div>
