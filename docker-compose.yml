services:
  stakeholders-neo4j:
    image: neo4j:5
    container_name: stakeholders-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: "neo4j/password123"
    volumes:
      - stakeholders_neo4j_data:/data
      - stakeholders_neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  blog-neo4j:
    image: neo4j:5
    container_name: blog-neo4j
    restart: unless-stopped
    ports:
      - "7475:7474"
      - "7688:7687"
    environment:
      NEO4J_AUTH: "neo4j/password123"
    volumes:
      - blog_neo4j_data:/data
      - blog_neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  follower-neo4j:
    image: neo4j:5
    container_name: follower-neo4j
    restart: unless-stopped
    ports:
      - "7476:7474"
      - "7689:7687"
    environment:
      NEO4J_AUTH: "neo4j/password123"
    volumes:
      - follower_neo4j_data:/data
      - follower_neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  tours-mongo:
    image: mongo:7
    container_name: tours-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - tours_mongo_data:/data/db

  stakeholders:
    build:
      context: ./stakeholders
    container_name: soa-stakeholders-app
    restart: unless-stopped
    depends_on:
      stakeholders-neo4j:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: "8080"
      NEO4J_USERNAME: "neo4j"
      NEO4J_PASSWORD: "password123"
      NEO4J_URI: "neo4j://stakeholders-neo4j:7687"
      NEO4J_DATABASE: "neo4j"
      JWT_SECRET: "change-me"
      JWT_ISSUER: "stakeholders-service"
      JWT_EXPIRATION_MINUTES: "60"
      CORS_ALLOWED_ORIGINS: "http://localhost:4200"

  blog:
    build:
      context: ./blog
    container_name: soa-blog-app
    restart: unless-stopped
    depends_on:
      blog-neo4j:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: "8081"
      NEO4J_USERNAME: "neo4j"
      NEO4J_PASSWORD: "password123"
      NEO4J_URI: "neo4j://blog-neo4j:7687"
      NEO4J_DATABASE: "neo4j"
      JWT_SECRET: "change-me"
      JWT_ISSUER: "stakeholders-service"
      FOLLOWER_SERVICE_URL: "http://follower:8082"
      CORS_ALLOWED_ORIGINS: "http://localhost:4200"

  follower:
    build:
      context: ./follower
    container_name: soa-follower-app
    restart: unless-stopped
    depends_on:
      follower-neo4j:
        condition: service_healthy
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: "8082"
      NEO4J_USERNAME: "neo4j"
      NEO4J_PASSWORD: "password123"
      NEO4J_URI: "neo4j://follower-neo4j:7687"
      NEO4J_DATABASE: "neo4j"
      JWT_SECRET: "change-me"
      JWT_ISSUER: "stakeholders-service"
      STAKEHOLDERS_SERVICE_URL: "http://stakeholders:8080"
      CORS_ALLOWED_ORIGINS: "http://localhost:4200"

  tours:
    build:
      context: ./Tours
    container_name: soa-tours-app
    restart: unless-stopped
    depends_on:
      - tours-mongo
    ports:
      - "8083:8083"
    environment:
      SERVER_PORT: "8083"
      MONGODB_URI: "mongodb://tours-mongo:27017/toursdb"
      JWT_SECRET: "change-me"
      JWT_ISSUER: "stakeholders-service"

  front:
    build:
      context: ./front
    container_name: soa-front-app
    restart: unless-stopped
    depends_on:
      - blog
      - stakeholders
      - follower
      - tours

  gateway:
    build:
      context: ./gateway
    container_name: soa-api-gateway
    restart: unless-stopped
    depends_on:
      - front
      - stakeholders
      - blog
      - follower
      - tours
    ports:
      - "4200:80"

volumes:
  stakeholders_neo4j_data:
  stakeholders_neo4j_logs:
  blog_neo4j_data:
  blog_neo4j_logs:
  follower_neo4j_data:
  follower_neo4j_logs:
  tours_mongo_data:
