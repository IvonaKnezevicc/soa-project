services:
  stakeholders-neo4j:
    image: neo4j:5
    container_name: stakeholders-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: "neo4j/password123"
    volumes:
      - stakeholders_neo4j_data:/data
      - stakeholders_neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  blog-neo4j:
    image: neo4j:5
    container_name: blog-neo4j
    restart: unless-stopped
    ports:
      - "7475:7474"
      - "7688:7687"
    environment:
      NEO4J_AUTH: "neo4j/password123"
    volumes:
      - blog_neo4j_data:/data
      - blog_neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  stakeholders:
    build:
      context: ./stakeholders
    container_name: soa-stakeholders-app
    restart: unless-stopped
    depends_on:
      stakeholders-neo4j:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: "8080"
      NEO4J_USERNAME: "neo4j"
      NEO4J_PASSWORD: "password123"
      NEO4J_URI: "neo4j://stakeholders-neo4j:7687"
      NEO4J_DATABASE: "neo4j"
      JWT_SECRET: "change-me"
      JWT_ISSUER: "stakeholders-service"
      JWT_EXPIRATION_MINUTES: "60"
      CORS_ALLOWED_ORIGINS: "http://localhost:4200"

  blog:
    build:
      context: ./blog
    container_name: soa-blog-app
    restart: unless-stopped
    depends_on:
      blog-neo4j:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: "8081"
      NEO4J_USERNAME: "neo4j"
      NEO4J_PASSWORD: "password123"
      NEO4J_URI: "neo4j://blog-neo4j:7687"
      NEO4J_DATABASE: "neo4j"
      JWT_SECRET: "change-me"
      JWT_ISSUER: "stakeholders-service"
      CORS_ALLOWED_ORIGINS: "http://localhost:4200"

  front:
    build:
      context: ./front
    container_name: soa-front-app
    restart: unless-stopped
    depends_on:
      - stakeholders
      - blog
    ports:
      - "4200:80"

volumes:
  stakeholders_neo4j_data:
  stakeholders_neo4j_logs:
  blog_neo4j_data:
  blog_neo4j_logs:
